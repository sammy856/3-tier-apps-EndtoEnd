name: Backend CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYVAULT_NAME: your-keyvault-name
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.creds }}

      - name: Get DB Connection String
        run: |
          DB_CONN=$(az keyvault secret show \
            --vault-name $KEYVAULT_NAME \
            --name db-connection-string \
            --query value -o tsv)

          echo "::add-mask::$DB_CONN"
          echo "DB_CONNECTION_STRING=$DB_CONN" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg2 unixodbc unixodbc-dev
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | \
            gpg --dearmor | sudo tee /usr/share/keyrings/microsoft.gpg > /dev/null

          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/debian/12/prod bookworm main" | \
            sudo tee /etc/apt/sources.list.d/mssql-release.list

          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend
        env:
          DB_CONNECTION_STRING: ${{ env.DB_CONNECTION_STRING }}
        run: |
          uvicorn app:app --host 0.0.0.0 --port 8000
