name: CD Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Terraform init and output
        working-directory: infra/environment/dev
        run: |
          terraform init -backend=false
          terraform output -json > tfout.json || true
          jq . tfout.json || true

      - name: Extract backend VM info
        working-directory: infra/environment/dev
        id: extract
        run: |
          # find first VM name and id from terraform outputs
          VM_NAME=$(jq -r '.[].value | objects | .[] | select(.name) | .name' tfout.json | head -n1)
          VM_ID=$(jq -r '.[].value | objects | .[] | select(.id) | .id' tfout.json | head -n1)
          if [ -z "$VM_NAME" ] || [ -z "$VM_ID" ]; then echo "Could not extract VM info from terraform outputs"; exit 1; fi
          echo "VM_NAME=$VM_NAME" >> $GITHUB_ENV
          echo "VM_ID=$VM_ID" >> $GITHUB_ENV

      - name: Get VM resource group
        run: |
          # resource id has /resourceGroups/<rg>/...
          VM_RG=$(echo "$VM_ID" | sed -n 's#.*/resourceGroups/\([^/]*\)/.*#\1#p')
          echo "VM_RG=$VM_RG" >> $GITHUB_ENV

      - name: Deploy to backend VM via Run Command
        env:
          SSHKEY: ${{ secrets.SSHKEY }}
        run: |
          cat > /tmp/remote-deploy.sh <<EOF
          set -euo pipefail
          mkdir -p /tmp/ssh
          cat > /tmp/ssh/id_rsa <<'KEYEOF'
          $SSHKEY
          KEYEOF
          chmod 600 /tmp/ssh/id_rsa
          ssh-keyscan github.com >> /tmp/ssh/known_hosts
          export GIT_SSH_COMMAND='ssh -i /tmp/ssh/id_rsa -o UserKnownHostsFile=/tmp/ssh/known_hosts -o StrictHostKeyChecking=yes'
          git clone git@github.com:${GITHUB_REPOSITORY}.git /tmp/repo
          ls -la /tmp/repo/PyTodoBackendMonolith
          cd /tmp/repo/PyTodoBackendMonolith
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          nohup uvicorn app:app --host 0.0.0.0 --port 8000 &
          EOF

          az vm run-command invoke \
            --command-id RunShellScript \
            --name "$VM_NAME" \
            --resource-group "$VM_RG" \
            --scripts "$(cat /tmp/remote-deploy.sh)"
